<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SummarAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --accent: #e8c547;
      --accent2: #c97d4e;
      --text: #f0ede8;
      --muted: #7a7a8a;
      --success: #5fd4a0;
      --error: #e05a5a;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-mono: 'DM Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(232,197,71,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(201,125,78,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 32px 80px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 60px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 28px;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
    }

    .logo span {
      color: var(--accent);
    }

    .tagline {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 500;
      border-left: 1px solid var(--border);
      padding-left: 16px;
    }

    /* Model badge */
    .model-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 12px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
    }

    .model-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Main grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 28px;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .logo { font-size: 1.8rem; }
      .tagline { display: none; }
    }

    /* Panels */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .panel:focus-within {
      border-color: rgba(232,197,71,0.4);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .panel-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 500;
    }

    .word-count {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 280px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.92rem;
      line-height: 1.7;
      padding: 20px 18px;
      resize: vertical;
      font-weight: 300;
    }

    textarea::placeholder { color: var(--muted); }

    /* Output panel */
    .output-panel .panel-header { border-bottom-color: var(--border); }

    .output-content {
      min-height: 280px;
      padding: 20px 18px;
      font-size: 0.92rem;
      line-height: 1.8;
      font-weight: 300;
      color: var(--text);
      position: relative;
    }

    .output-content.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-style: italic;
      font-size: 0.85rem;
    }

    .output-content.loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    /* Typing animation for loading */
    .loader {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .loader span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .loader span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
    .loader span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .loader-text {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* Controls row */
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
    }

    .slider-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 90px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .slider-val {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--accent);
      min-width: 28px;
    }

    /* Summarize button */
    .btn-summarize {
      margin-left: auto;
      background: var(--accent);
      color: #0d0d0f;
      border: none;
      border-radius: 6px;
      padding: 12px 28px;
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-summarize::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .btn-summarize:hover::after { opacity: 1; }
    .btn-summarize:active { transform: scale(0.98); }
    .btn-summarize:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    .btn-summarize:disabled::after { display: none; }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .stat-card {
      flex: 1;
      min-width: 130px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
    }

    .stat-value {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .stat-value.green { color: var(--success); }
    .stat-value.amber { color: var(--accent2); }

    .stat-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Error */
    .error-msg {
      background: rgba(224,90,90,0.1);
      border: 1px solid rgba(224,90,90,0.3);
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 0.84rem;
      color: var(--error);
      margin-top: 16px;
      font-family: var(--font-mono);
      animation: fadeIn 0.3s ease;
    }

    /* Copy button */
    .btn-copy {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.68rem;
      font-family: var(--font-mono);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .btn-copy:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Footer */
    footer {
      margin-top: 60px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: var(--font-mono);
      letter-spacing: 0.06em;
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .summary-text {
      animation: fadeIn 0.5s ease;
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1rem;
      line-height: 1.9;
      color: var(--text);
    }

    /* Compression bar */
    .compression-bar-wrap {
      margin-top: 6px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .compression-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 2px;
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Summar<span>AI</span></div>
    <div class="tagline">ML-Powered Text Condensation</div>
    <div class="model-badge">
      <div class="dot"></div>
      BART-Large-CNN
    </div>
  </header>

  <div class="grid">
    <!-- Input panel -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">Input Text</span>
        <span class="word-count" id="inputCount">0 words</span>
      </div>
      <textarea
        id="inputText"
        placeholder="Paste or type your article, document, or any long-form text here. Minimum 50 characters required…"
        oninput="updateWordCount()"
      ></textarea>
    </div>

    <!-- Output panel -->
    <div class="panel output-panel">
      <div class="panel-header">
        <span class="panel-label">Summary</span>
        <button class="btn-copy" id="copyBtn" onclick="copySummary()" style="display:none">Copy</button>
      </div>
      <div class="output-content empty" id="outputContent">
        <span>Your summary will appear here</span>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="slider-group">
      <span class="slider-label">Max Words</span>
      <input type="range" id="maxLen" min="60" max="300" value="150" oninput="document.getElementById('maxVal').textContent=this.value"/>
      <span class="slider-val" id="maxVal">150</span>
    </div>
    <div class="slider-group">
      <span class="slider-label">Min Words</span>
      <input type="range" id="minLen" min="20" max="100" value="40" oninput="document.getElementById('minVal').textContent=this.value"/>
      <span class="slider-val" id="minVal">40</span>
    </div>
    <button class="btn-summarize" id="summarizeBtn" onclick="summarize()">
      Summarize →
    </button>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg" style="display:none"></div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat-card">
      <div class="stat-value" id="origWords">—</div>
      <div class="stat-label">Original Words</div>
    </div>
    <div class="stat-card">
      <div class="stat-value green" id="summWords">—</div>
      <div class="stat-label">Summary Words</div>
    </div>
    <div class="stat-card">
      <div class="stat-value amber" id="compression">—</div>
      <div class="stat-label">Compression</div>
      <div class="compression-bar-wrap">
        <div class="compression-bar" id="compressionBar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <footer>
    Backend: Flask + HuggingFace Transformers &nbsp;|&nbsp;
    Model: <a href="https://huggingface.co/facebook/bart-large-cnn" target="_blank">facebook/bart-large-cnn</a>
    &nbsp;|&nbsp; API at <code>localhost:5000</code>
  </footer>
</div>

<script>
  const API_URL = "http://localhost:8000";
  let currentSummary = "";

  function updateWordCount() {
    const text = document.getElementById("inputText").value.trim();
    const count = text ? text.split(/\s+/).length : 0;
    document.getElementById("inputCount").textContent = `${count} word${count !== 1 ? 's' : ''}`;
  }

  async function summarize() {
    const text = document.getElementById("inputText").value.trim();
    const maxLen = parseInt(document.getElementById("maxLen").value);
    const minLen = parseInt(document.getElementById("minLen").value);
    const btn = document.getElementById("summarizeBtn");
    const output = document.getElementById("outputContent");
    const errorMsg = document.getElementById("errorMsg");
    const statsRow = document.getElementById("statsRow");
    const copyBtn = document.getElementById("copyBtn");

    if (!text) {
      showError("Please enter some text to summarize.");
      return;
    }

    if (text.length < 50) {
      showError("Text is too short. Please provide at least 50 characters.");
      return;
    }

    // Reset UI
    errorMsg.style.display = "none";
    statsRow.style.display = "none";
    copyBtn.style.display = "none";
    btn.disabled = true;
    btn.textContent = "Summarizing…";

    // Show loading state
    output.className = "output-content loading";
    output.innerHTML = `
      <div class="loader">
        <span></span><span></span><span></span>
      </div>
      <div class="loader-text">Running BART inference…</div>
    `;

    try {
      const response = await fetch(`${API_URL}/summarize`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, max_length: maxLen, min_length: minLen })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Server error. Is the backend running?");
      }

      currentSummary = data.summary;

      // Show summary
      output.className = "output-content";
      output.innerHTML = `<div class="summary-text">${data.summary}</div>`;
      copyBtn.style.display = "inline-block";

      // Show stats
      document.getElementById("origWords").textContent = data.original_word_count.toLocaleString();
      document.getElementById("summWords").textContent = data.summary_word_count.toLocaleString();
      document.getElementById("compression").textContent = `${data.compression_ratio}%`;
      statsRow.style.display = "flex";

      // Animate compression bar
      setTimeout(() => {
        document.getElementById("compressionBar").style.width = `${data.compression_ratio}%`;
      }, 100);

    } catch (err) {
      output.className = "output-content empty";
      output.innerHTML = `<span>Your summary will appear here</span>`;
      showError(err.message || "Could not connect to backend. Make sure Flask is running on port 5000.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Summarize →";
    }
  }

  function showError(msg) {
    const el = document.getElementById("errorMsg");
    el.textContent = `⚠ ${msg}`;
    el.style.display = "block";
  }

  async function copySummary() {
    if (!currentSummary) return;
    await navigator.clipboard.writeText(currentSummary);
    const btn = document.getElementById("copyBtn");
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy", 1800);
  }
</script>
</body>
</html>
